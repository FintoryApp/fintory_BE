server:
  port: 8080

spring:
  config:
    import: "optional:file:.env"
    activate:
      on-profile: local

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}


  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  messages:
    basename: messages
    encoding: UTF-8

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration-minutes: ${ACCESS_TOKEN_EXPIRATION_MINUTES}
  refresh-token-expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

hantu-openapi:
  appkey: ${HANTU_APPKEY}
  appsecret: ${HANTU_APPSECRET}


db-openapi:
  db-appkey: ${DB_APPKEY}
  db-appsecret: ${DB_APPSECRET}